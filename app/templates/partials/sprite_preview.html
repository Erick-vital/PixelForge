<div class="sprite-preview-card">
  <h3>Procedural PNG preview</h3>
  <img class="sprite-preview-image" src="{{ png_data_uri }}" alt="Procedurally rendered sprite preview" />
  <dl class="metadata-grid">
    <div><dt>recipe</dt><dd>{{ report.recipe }}</dd></div>
    <div><dt>seed</dt><dd>{{ report.seed }}</dd></div>
    <div><dt>size</dt><dd>{{ report.width }}x{{ report.height }}</dd></div>
    <div><dt>colors</dt><dd>{{ report.color_count }}</dd></div>
  </dl>
</div>
